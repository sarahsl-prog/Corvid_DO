name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-lint-${{ hashFiles('pyproject.toml') }}
          restore-keys: uv-lint-

      - name: Install dev dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run ruff
        run: ruff check .

      - name: Run black (check only)
        run: black --check .

  type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-typecheck-${{ hashFiles('pyproject.toml') }}
          restore-keys: uv-typecheck-

      - name: Install dev dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run mypy
        run: mypy corvid/

  security:
    name: Security Scan (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-security-${{ hashFiles('pyproject.toml') }}
          restore-keys: uv-security-

      - name: Install dev dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run bandit
        run: bandit -r corvid/ -ll

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: corvid
          POSTGRES_USER: corvid
          POSTGRES_PASSWORD: corvid
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U corvid"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CORVID_DATABASE_URL: postgresql+asyncpg://corvid:corvid@localhost:5432/corvid
      CORVID_REDIS_URL: redis://localhost:6379/0
      # Placeholder — agent tests mock the Gradient client so no real key is needed
      CORVID_GRADIENT_API_KEY: ci-placeholder

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-test-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: uv-test-${{ matrix.python-version }}-

      - name: Install dev dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run tests with coverage
        run: pytest --cov=corvid --cov-report=xml -m "not e2e and not smoke" -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
